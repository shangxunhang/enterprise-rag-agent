schema_version: grounded_generation_policy_v1
policy_id: grounded_generation_v1
policy_version: v1
generation_checker:
  name: self_rag_lite
  version: v1
  enabled: true
  params:
    use_llm: true
    fallback_to_deterministic: true
repair_strategy:
  name: local_rewrite
  version: v1
  enabled: true
  params:
    use_llm: true
    max_new_tokens: 768
    fallback_to_original: true
max_retrieval_rounds: 1
max_rewrite_rounds: 1
max_total_llm_calls: 35
max_total_tokens: 24000
human_review_on_exhaustion: true
budget_scope: section
