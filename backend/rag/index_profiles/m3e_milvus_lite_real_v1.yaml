schema_version: offline_index_build_config_v1
build_id: m3e_milvus_lite_real_v1
dataset_version: cleaned_text_units_real_v1
source:
  path: data/processed/cleaned_text_units.jsonl
  format: jsonl
chunker:
  name: fixed_parent_child
  version: v1
  params:
    parent_chunk_size: 1500
    parent_chunk_overlap: 150
    child_chunk_size: 500
    child_chunk_overlap: 50
    unit: token
    tokenizer_model_name: D:/models/huggingface/embedding/m3e-base
