  mode: model
  name: m3e_base
  version: local_m3e_base_v1
  model_name: D:/models/huggingface/embedding/m3e-base
  device: cuda
  batch_size: 32
  dim: 768
index:
  backend: milvus_lite
  metric_type: COSINE
  collection_name: rag_child_chunks
  recreate: true
  insert_batch_size: 128
  max_text_chars: 8192
outputs:
  root_dir: data/processed/indexes
  active_pointer: data/processed/indexes/active_index.json
  update_active_pointer: false
