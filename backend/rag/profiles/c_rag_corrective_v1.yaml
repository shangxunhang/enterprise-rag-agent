schema_version: online_rag_pipeline_config_v5
profile_id: c_rag_corrective_v1
profile_version: v1
query_transformers:
- name: identity
  version: v1
  enabled: true
  params: {}
retrievers:
- name: milvus_dense_child
  version: v1
  enabled: true
  params:
    top_k: 10
- name: bm25_child
  version: v1
  enabled: true
  params:
    top_k: 10
fusion:
  name: rrf_child
  version: v1
  enabled: true
  params:
    rrf_k: 60
query_fusion:
  name: rrf_parent
  version: v1
  enabled: true
  params:
    rrf_k: 60
    top_k: 5
candidate_enricher:
  name: parent_child
  version: v1
  enabled: true
  params:
    top_k: 5
    context_granularity: parent
    dedup_parent: true
reranker:
  name: bge_parent_cross_encoder
  version: v1
  enabled: true
  params:
    top_k: 5
    text_field: parent_text
evidence_grader:
  name: crag_corrective
  version: v1
  enabled: true
  params:
    max_judge_chunks: 8
    drop_irrelevant: true
    keep_at_least: 1
    use_llm: true
    fallback_to_deterministic: true
    ranking_policy: demotion_only
    confidence_threshold: 0.55
    min_relevant_chunks: 1
    max_correction_queries: 2
    max_correction_rounds: 1
    merge_original_candidates: true
    query_planner: section_gap_aware_v1
    reject_trivial_rewrites: true
context_packer:
  name: lost_in_middle
  version: v1
  enabled: true
  params:
    max_context_chars: 6000
    max_items: 3
    text_field: text
    dedup_parent: true
    include_metadata: true
generation_checker:
  name: noop_generation
  version: v1
  enabled: true
  params: {}
repair_strategy:
  name: noop_repair
  version: v1
  enabled: true
  params: {}
