schema_version: rag_experiment_matrix_v1
matrix_id: adaptive_intent_smoke_v1
dataset_path: data/eval/rag_strategy_smoke_v1.jsonl
dataset_version: smoke_dataset_v1
eval_set_version: rag_strategy_smoke_v1
index_version: current_parent_child_index
output_dir: data/eval_outputs/strategy_eval
baseline_experiment_id: identity_no_correction
metrics: [context_keyword_hit, result_count, latency_ms]
seed: 42
fail_fast: false
experiments:
  - schema_version: rag_experiment_config_v1
    experiment_id: identity_no_correction
    static_retrieval_spec_file: backend/rag/config/static_retrieval_v1.yaml
    retrieval_plan_overrides:
      query_transform_mode: identity
      correction_budget: 0
    mode: retrieval
    top_k: 5
    tags: [smoke, baseline]
  - schema_version: rag_experiment_config_v1
    experiment_id: multi_query
    static_retrieval_spec_file: backend/rag/config/static_retrieval_v1.yaml
    retrieval_plan_overrides:
      query_transform_mode: multi_query
      correction_budget: 0
    mode: retrieval
    top_k: 5
    tags: [smoke, multi_query]
  - schema_version: rag_experiment_config_v1
    experiment_id: hyde
    static_retrieval_spec_file: backend/rag/config/static_retrieval_v1.yaml
    retrieval_plan_overrides:
      query_transform_mode: hyde
      correction_budget: 0
    mode: retrieval
    top_k: 5
    tags: [smoke, hyde]
  - schema_version: rag_experiment_config_v1
    experiment_id: assessment_driven_correction
    static_retrieval_spec_file: backend/rag/config/static_retrieval_v1.yaml
    retrieval_plan_overrides:
      query_transform_mode: identity
      correction_budget: 1
    mode: retrieval
    top_k: 5
    tags: [smoke, corrective_retrieval]
notes: One static topology; experiments vary only request intent and correction budget.
