    experiment_id: identity
    static_retrieval_spec_file: backend/rag/config/static_retrieval_v1.yaml
    retrieval_plan_overrides:
      query_transform_mode: identity
      correction_budget: 0
    mode: retrieval
    top_k: 5
    tags: [smoke, quick, baseline]
  - schema_version: rag_experiment_config_v1
    experiment_id: multi_query
    static_retrieval_spec_file: backend/rag/config/static_retrieval_v1.yaml
    retrieval_plan_overrides:
      query_transform_mode: multi_query
      correction_budget: 0
    mode: retrieval
    top_k: 5
    tags: [smoke, quick, multi_query]
notes: Synthetic smoke matrix for the evaluation pipeline only.
